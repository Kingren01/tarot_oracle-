generate_comprehensive_10_page_executive_summary:
  description: |-
    Create a comprehensive 10-page executive summary that details all research findings, competitive intelligence analysis, and strategic recommendations. The executive summary must be a complete standalone document covering:

    **Executive Summary Structure (10 Pages):**

    **Pages 1-2: Strategic Overview & Key Findings**
    - Comprehensive displacement opportunity assessment
    - Executive summary of competitive gaps identified
    - Strategic recommendations and implementation priorities
    - Key financial metrics and ROI projections overview

    **Pages 3-4: Target Account Deep Dive**
    - Complete {target_account} organizational profile and analysis
    - Current technology infrastructure assessment
    - Strategic priorities, challenges, and transformation requirements
    - Financial performance metrics and market positioning
    - Organizational structure and key stakeholder mapping

    **Pages 5-6: Competitive Gap Analysis & Incumbent Performance**
    - Detailed analysis of {competitor_name} service delivery gaps
    - Specific performance issues, delays, and quality problems
    - Market benchmark comparisons and competitive positioning
    - Quantified impact of current service limitations
    - Industry benchmark comparisons and peer analysis

    **Pages 7-8: Agilisium Solution Portfolio & Accelerator Mapping**
    - Complete NextGen DataOps Platform overview
    - Detailed accelerator portfolio analysis (GenInsights, Data Vigor, Gene Inspector, Autonomous Agentic AI)
    - Point-by-point mapping of solutions to identified gaps
    - Hyper-automation opportunities and "Plug & Play" implementation approach
    - Technical differentiation and competitive advantages

    **Pages 9-10: Business Case, ROI Analysis & Implementation Strategy**
    - Comprehensive financial analysis and ROI calculations
    - Market-based displacement scoring methodology and results
    - Detailed implementation roadmap with phases, timelines, and milestones
    - Risk assessment, mitigation strategies, and success probability analysis
    - Executive decision framework and recommended next steps

    **Formatting Requirements:**
    - Professional executive document format with clear section headers
    - Quantified metrics and specific data points throughout
    - Source citations and data validation notes
    - Charts, tables, and visual data representations described
    - "Accelerating Scientific Innovation" theme integrated throughout
    - Executive-ready language and strategic focus
  expected_output: "**COMPREHENSIVE 10-PAGE EXECUTIVE SUMMARY**\n**Life Sciences Competitive
    Displacement Strategy for {target_account}**\n\n**TABLE OF CONTENTS**\nExecutive
    Overview & Strategic Recommendations...........p.1\nTarget Account Profile & Market
    Analysis................p.3\nCompetitive Gap Assessment & Incumbent Performance......p.5\nAgilisium
    Solution Portfolio & Accelerator Mapping.....p.7\nBusiness Case, ROI Analysis
    & Implementation...........p.9\n\n---\n\n**PAGES 1-2: EXECUTIVE OVERVIEW & STRATEGIC
    RECOMMENDATIONS**\n\n**Displacement Opportunity Assessment**\n[Comprehensive overview
    of the competitive displacement opportunity with specific metrics, financial impact
    projections, and strategic rationale]\n\n**Key Findings Summary**\n- Target Account
    Strategic Position: [Detailed assessment with supporting metrics]\n- Incumbent
    Service Gaps: [Quantified analysis of current provider limitations]\n- Market
    Opportunity: [Specific financial and strategic metrics]\n- Competitive Advantages:
    [Agilisium differentiation factors with quantified benefits]\n\n**Strategic Recommendations**\n1.
    [Priority recommendation with supporting rationale and expected outcomes]\n2.
    [Implementation approach with timeline and resource requirements]\n3. [Risk mitigation
    strategies and success probability factors]\n\n**Executive Financial Summary**\n-
    Displacement Score: [XX/100] with methodology explanation\n- ROI Projection: [$XX.XM]
    over [XX months] with [XX%] confidence\n- Investment Required: [$XX.XM] with [XX
    month] payback period\n- Market Opportunity: [Quantified market size and competitive
    positioning]\n\n---\n\n**PAGES 3-4: TARGET ACCOUNT DEEP DIVE**\n\n**Organizational
    Profile**\n[Complete analysis of {target_account} including company type, size,
    revenue, organizational structure, and strategic focus areas with verified data
    and sources]\n\n**Technology Infrastructure Assessment**\n[Detailed evaluation
    of current systems, technology stack, integration challenges, and digital transformation
    initiatives with specific metrics and documented gaps]\n\n**Strategic Priorities
    & Market Pressures**\n[Analysis of business priorities, market challenges, regulatory
    requirements, and competitive pressures specific to Life Sciences industry context]\n\n**Financial
    Performance & Market Positioning**\n[Verified financial metrics, market share
    data, competitive positioning analysis, and benchmark comparisons with credible
    sources]\n\n---\n\n**PAGES 5-6: COMPETITIVE GAP ANALYSIS & INCUMBENT PERFORMANCE**\n\n**Service
    Delivery Gap Analysis**\n[Comprehensive analysis of {competitor_name} performance
    gaps including specific incidents, delays, quality issues, and quantified business
    impact]\n\n**Technology & Process Limitations**\n[Detailed assessment of technology
    constraints, manual processes, data integration challenges, and automation deficits
    with specific examples and metrics]\n\n**Market Benchmark Analysis**\n[Comparative
    analysis against industry standards, peer performance metrics, and competitive
    positioning with credible benchmark sources and data]\n\n**Quantified Impact Assessment**\n[Financial
    impact analysis of current service limitations including cost overruns, timeline
    delays, opportunity costs, and competitive disadvantages]\n\n---\n\n**PAGES 7-8:
    AGILISIUM SOLUTION PORTFOLIO & ACCELERATOR MAPPING**\n\n**NextGen DataOps Platform
    Overview**\n[Comprehensive presentation of Agilisium's platform capabilities,
    technical architecture, and competitive advantages with Everest Group/ISG recognition]\n\n**Accelerator
    Portfolio Analysis**\n- GenInsights: [Detailed capabilities, use cases, and quantified
    benefits for biomarker discovery and analytics]\n- Data Vigor: [Real-time observability
    features, uptime metrics, and operational advantages]  \n- Gene Inspector: [Omics
    data unification capabilities, timeline acceleration, and scientific impact]\n-
    Autonomous Agentic AI: [Automation capabilities, process replacement potential,
    and efficiency gains]\n\n**Gap-to-Solution Mapping**\n[Point-by-point mapping
    of identified gaps to specific Agilisium accelerators with implementation approach
    and expected outcomes]\n\n**Technical Differentiation Analysis**\n[Detailed comparison
    of Agilisium capabilities vs. current provider and competitive alternatives with
    specific technical and business advantages]\n\n---\n\n**PAGES 9-10: BUSINESS CASE,
    ROI ANALYSIS & IMPLEMENTATION STRATEGY**\n\n**Financial Analysis & ROI Calculations**\n[Comprehensive
    financial modeling including cost savings, revenue impact, investment requirements,
    and ROI calculations with methodology, assumptions, and sensitivity analysis]\n\n**Displacement
    Scoring Methodology**\n[Detailed explanation of scoring approach, component analysis,
    benchmark comparisons, and final displacement score with confidence intervals]\n\n**Implementation
    Roadmap**\n- Phase 1 (0-90 days): [Detailed activities, milestones, and deliverables]\n-
    Phase 2 (90-180 days): [Core platform migration and integration activities]  \n-
    Phase 3 (180-365 days): [Full deployment, optimization, and value realization]\n\n**Risk
    Assessment & Mitigation**\n[Comprehensive risk analysis including technical, operational,
    and business risks with specific mitigation strategies and contingency plans]\n\n**Executive
    Decision Framework**\n[Strategic recommendations, decision criteria, success metrics,
    and recommended next steps for executive consideration]\n\n**Success Probability
    Analysis**\n[Evidence-based assessment of implementation success probability with
    historical benchmarks, risk factors, and confidence levels]\n\n---\n\n**Document
    Specifications:**\n- Total Length: 10 pages of substantive executive content\n-
    Format: Professional business document with executive summary structure\n- Data
    Requirements: All metrics, calculations, and claims must be verified and sourced\n-
    Audience: C-level executives and senior decision makers\n- Purpose: Comprehensive
    competitive displacement strategy and business case"
  agent: data_export_formatting_specialist
  context:
  - verified_intelligence_research_target_account_competitor_analysis
  - validated_gap_analysis_infrastructure_service_delivery_assessment
  - apply_the_agilisium_angle_map_proprietary_accelerators
  - market_based_roi_calculation_displacement_scoring
generate_dashboard_metrics_kpis:
  description: "Extract and structure all quantified metrics from the competitive
    intelligence analysis into dashboard-ready format. Create KPIs, trend indicators,
    and visualization data points including:\n\n**Key Metrics to Extract:**\n- Displacement
    scores with breakdown components\n- ROI projections and financial impact metrics\n-
    Gap analysis scores and priority rankings  \n- Market benchmark comparisons\n-
    Competitive advantage indicators\n- Implementation timeline metrics\n- Success
    probability indicators\n\n**Dashboard Format Requirements:**\n- JSON structure
    with metric categories\n- Visualization type recommendations (charts, gauges,
    scorecards)\n- Color coding and alert thresholds\n- Time-series data where applicable\n-
    Comparative metrics (vs competitors, vs benchmarks)\n- Executive summary metrics
    for C-level dashboards"
  expected_output: |-
    **DASHBOARD METRICS PACKAGE (JSON Format)**

    ```json
    {
      "executive_summary": {
        "displacement_score": {"value": XX, "trend": "up/down/stable", "benchmark": XX},
        "roi_projection": {"value": "XX%", "timeline": "XX months", "confidence": "XX%"},
        "priority_gaps": {"count": X, "high_impact": X, "addressable": X},
        "competitive_advantage": {"score": XX, "category": "strong/moderate/weak"}
      },
      "detailed_metrics": {
        "gap_analysis": [
          {"category": "Infrastructure", "score": XX, "impact": "high/medium/low", "addressable": true/false},
          {"category": "Service Delivery", "score": XX, "impact": "high/medium/low", "addressable": true/false}
        ],
        "market_benchmarks": [
          {"metric": "Performance vs Peers", "value": XX, "percentile": XX, "trend": "improving/declining"},
          {"metric": "Technology Adoption", "value": XX, "industry_average": XX, "gap": XX}
        ],
        "financial_projections": {
          "cost_savings": {"annual": "$XX", "three_year": "$XX", "sources": ["efficiency", "automation"]},
          "revenue_impact": {"potential": "$XX", "timeline": "XX months", "probability": "XX%"},
          "investment_required": {"initial": "$XX", "ongoing": "$XX", "payback_period": "XX months"}
        }
      },
      "visualization_config": {
        "charts": ["displacement_gauge", "roi_timeline", "gap_heatmap", "benchmark_radar"],
        "alerts": [{"metric": "displacement_score", "threshold": 75, "action": "highlight"}],
        "filters": ["time_period", "metric_category", "confidence_level"]
      }
    }
    ```
