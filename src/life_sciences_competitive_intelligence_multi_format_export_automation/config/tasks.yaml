---
verified_intelligence_research_target_account_competitor_analysis:
  description: |-
    **IMPORTANT: File Upload Processing Instructions**
    If files are provided by the user, read and analyze them FIRST using the FileReadTool before conducting any external research. Look for file attachments that may contain:
    - Target account data (company profiles, financial info, organizational charts)
    - Competitor intelligence (service contracts, performance data, engagement details)
    - Market research (benchmarks, industry reports, competitive analysis)

    **Primary Research Task:**
    Conduct comprehensive, fact-based research on {target_account} and their relationship with {competitor_name}. All research must be verified and sourced. Investigate:

    **Target Account Analysis (Life Sciences/GCC/Research Institute):**
    - Company profile: type (pharma, biotech, GCC, research), size, revenue, employee count
    - Current strategic priorities and business challenges
    - Technology stack and digital transformation initiatives
    - Financial performance (latest available data with sources)
    - Organizational structure: key departments, decision-making hierarchy
    - Key stakeholders and decision makers

    **Competitor Engagement Details:**
    - Current projects and scope of engagement with {competitor_name}
    - Duration, timeline, and contract value (if publicly available)
    - Key personnel involved from both organizations
    - Service areas: technology, consulting, implementation, support
    - Recent developments, press releases, or public information

    **Pain Points Identification:**
    - Documented operational challenges and inefficiencies
    - Technology gaps and infrastructure limitations
    - Process bottlenecks affecting productivity
    - Market pressures and competitive disadvantages

    **Market Context & Benchmarks:**
    - Industry challenges specific to Life Sciences/research sector
    - Technology adoption trends and digital transformation pressure
    - Competitive landscape and market positioning

    **Critical Requirement:** All data points, metrics, and claims must be verifiable through reliable sources. Cite all sources and indicate when information is not publicly available.
  expected_output: |-
    **VERIFIED INTELLIGENCE REPORT**
    Comprehensive analysis containing:

    **1. Target Account Profile (Verified Data Only)**
    - Organization type, size, revenue, employee count (with sources)
    - Current strategic priorities and documented challenges
    - Technology infrastructure and transformation initiatives
    - Financial performance metrics (with source references)
    - Organizational structure and key stakeholders

    **2. Competitor Engagement Details**
    - Documented relationship scope, duration, and contract details
    - Key personnel and project involvement (where publicly available)
    - Service delivery areas and engagement timeline
    - Recent developments and public announcements

    **3. Pain Points Analysis**
    - Documented operational challenges and technology gaps
    - Market pressures and competitive dynamics
    - Digital transformation obstacles and requirements

    **4. Market Benchmarks**
    - Industry-specific performance metrics and standards
    - Competitive positioning against peer organizations
    - Technology adoption benchmarks for similar organizations

    **5. Data Verification Summary**
    - Complete list of sources and references used
    - Identification of data gaps or unverifiable claims
    - Confidence levels for different data points
  agent: life_sciences_intelligence_data_verification_specialist
validated_gap_analysis_infrastructure_service_delivery_assessment:
  description: "Analyze verified gaps in {competitor_name}'s service delivery at {target_account}
    using only documented evidence. Focus on factual, verifiable pain points and avoid
    speculation. \n\n**Analysis Framework:**\n- Use data from the verified intelligence
    report as primary input\n- Cross-reference with industry benchmarks and documented
    case studies\n- Identify specific, measurable gaps with evidence backing\n\n**Key
    Areas to Investigate:**\n- **Data Integration Challenges**: Documented silos,
    ETL issues, integration delays\n- **Technology Infrastructure**: Legacy systems,
    performance bottlenecks, scalability limits  \n- **Service Delivery Issues**:
    Cost overruns, timeline delays, quality problems\n- **Organizational Pain Points**:
    Process inefficiencies, resource constraints, change management\n- **Market Competitive
    Pressures**: Time-to-market delays, innovation gaps\n\n**Validation Requirements:**\n-
    Each identified gap must be supported by verifiable evidence\n- Pain points must
    be specific to the target organization's documented challenges\n- Market benchmarks
    must reference credible industry sources\n- When evidence is limited, clearly
    state the constraint"
  expected_output: |-
    **VALIDATED GAP ANALYSIS REPORT**

    **1. Documented Infrastructure Gaps (Evidence-Based)**
    - Specific technology and data integration challenges with supporting evidence
    - Performance bottlenecks and scalability limitations (with metrics where available)
    - Legacy system constraints affecting business operations

    **2. Service Delivery Pain Points**
    - Documented project delays, cost overruns, or performance issues
    - Resource allocation and expertise gaps
    - Change management and adoption challenges

    **3. Organizational Structure Impact**
    - Department-specific technology needs and gaps
    - Decision-making bottlenecks and process inefficiencies
    - Skills gaps and training requirements

    **4. Market Benchmark Comparison**
    - Verified industry standards and peer performance metrics
    - Competitive positioning gaps (with credible sources)
    - Time-to-market and innovation velocity comparisons

    **5. Evidence Summary**
    - Primary sources for each identified gap
    - Data reliability assessment and confidence levels
    - Areas requiring additional validation or investigation

    **6. Displacement Opportunity Assessment**
    - Priority gaps suitable for technology solutions
    - Quantified impact potential (where data supports calculation)
    - Risk factors and implementation considerations
  agent: verified_gap_analysis_pain_point_specialist
  context:
  - verified_intelligence_research_target_account_competitor_analysis
apply_the_agilisium_angle_map_proprietary_accelerators:
  description: |-
    Apply the Agilisium Angle: Select at least one Agilisium accelerator (e.g., Cloud Migration Accelerator or Data Warehouse Modernization) to solve each identified gap. Focus on:

    **NextGen DataOps Platform Solutions:**
    - **GenInsights**: Replace static BI with self-service analytics
    - **Data Vigor**: Provide real-time data observability and monitoring
    - **Gene Inspector**: For Omics and genomics data analysis (if applicable)
    - **Cloud Migration Accelerator**: Modernize legacy infrastructure
    - **Data Warehouse Modernization**: Break down data silos
    - **Autonomous Agentic AI**: Replace manual processes with AI automation

    **Hyper-automation Focus:**
    - Map each competitor weakness to specific Agilisium accelerator
    - Emphasize "Plug & Play" implementation approach
    - Highlight acceleration of "Molecule to Market" timeline
    - Show how Agilisium's approach enables Real-time Insights
  expected_output: |-
    A detailed accelerator mapping document containing:
    - Point-by-point mapping of Agilisium NextGen DataOps accelerators against competitor gaps
    - Specific tool recommendations (GenInsights, Data Vigor, Gene Inspector) for each weakness
    - Hyper-automation opportunities to replace {competitor_name}'s manual processes
    - "Plug & Play" implementation strategy for rapid deployment
    - Value propositions focused on accelerating Molecule to Market journey
    - Technical differentiation emphasizing Agilisium's Data Observability and Agentic AI capabilities
  agent: principal_solutions_architect_life_sciences_data_innovation
  context:
  - validated_gap_analysis_infrastructure_service_delivery_assessment
market_based_roi_calculation_displacement_scoring:
  description: "Calculate displacement scores and ROI projections using only verified
    market data and industry benchmarks. Base all calculations on documented evidence
    and established methodologies.\n\n**Data Sources Required:**\n- Verified financial
    data from target account research\n- Industry benchmark reports (Everest Group,
    ISG, Gartner, etc.)\n- Documented case studies and client outcomes\n- Market performance
    standards for Life Sciences organizations\n\n**Calculation Framework:**\n**Arena
    Displacement Score:**\n- Legacy Infrastructure Impact (40%): Based on documented
    gaps with measurable business impact\n- Market Readiness (30%): Using verified
    strategic priorities and documented transformation initiatives  \n- Competitive
    Advantage (30%): Based on published benchmarks and verified differentiators\n\n**ROI
    Projections (Market-Based):**\n- Sales Effectiveness: Use industry benchmark data
    for similar transformations\n- Operational Efficiency: Reference documented case
    study outcomes\n- Time-to-Market: Apply established Life Sciences acceleration
    metrics\n- Risk Assessment: Use historical success rates from credible sources\n\n**Validation
    Requirements:**\n- All financial calculations must reference source data\n- Industry
    benchmarks must cite specific reports and dates\n- Success probability calculations
    must be based on documented case studies\n- When data is insufficient, provide
    ranges with confidence intervals"
  expected_output: |-
    **MARKET-BASED DISPLACEMENT & ROI ANALYSIS**

    **1. Arena Displacement Score (Verified Methodology)**
    - Legacy Infrastructure Impact: Score with supporting evidence and calculation method
    - Market Readiness: Score based on documented strategic initiatives and market pressures
    - Competitive Advantage: Score using published benchmarks and verified differentiators
    - **Final Displacement Score**: Calculated percentage with methodology transparency

    **2. ROI Projections (Industry Benchmark-Based)**
    - **Sales Effectiveness Improvement**: Percentage range with benchmark sources
    - **Operational Efficiency Gains**: Metrics based on documented case studies
    - **Time-to-Market Acceleration**: Months/years saved with industry reference points
    - **Financial Impact Estimates**: Dollar amounts with calculation methodology and sources

    **3. Market Benchmark Comparisons**
    - Peer organization performance metrics (with sources)
    - Industry standard adoption rates and timelines
    - Competitive positioning analysis using verified data

    **4. Risk Assessment (Evidence-Based)**
    - Implementation success probability based on historical data
    - Risk factors identified from documented case studies
    - Mitigation strategies with proven track records

    **5. Calculation Transparency**
    - Complete methodology and formula documentation
    - Source references for all data points and benchmarks
    - Confidence levels and data quality assessment
    - Sensitivity analysis showing impact of variable assumptions
  agent: quantitative_data_analyst_market_benchmark_specialist
  context:
  - validated_gap_analysis_infrastructure_service_delivery_assessment
